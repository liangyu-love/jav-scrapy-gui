<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAV Scrapy Launcher</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail" aria-label="主导航">
        <div class="rail-brand">
          <h1>JAV Scrapy</h1>
          <p>启动器 ✿</p>
        </div>
        <nav class="rail-nav">
          <button id="toggleConfigDrawer" class="rail-button active" type="button" title="参数配置">⚙</button>
          <button id="toggleLogDrawer" class="rail-button" type="button" title="运行日志">📋</button>
          <button id="reloadResultsQuick" class="rail-button" type="button" title="刷新结果">↻</button>
        </nav>
      </aside>

      <section id="resultsView" class="results-panel" aria-label="结果浏览">
        <div class="dashboard">
          <div class="dash-card">
            <span class="status-dot idle" id="runDot"></span>
            <div>
              <small>运行状态</small>
              <strong id="runState">空闲</strong>
            </div>
          </div>
          <div class="dash-card">
            <small>结果</small>
            <strong id="resultCount">0</strong>
          </div>
          <div class="dash-card">
            <small>磁力</small>
            <strong id="magnetCount">0</strong>
          </div>
          <div class="dash-card">
            <small>错误</small>
            <strong id="errorCount">0</strong>
          </div>
          <div class="progress-wrap">
            <div class="progress-meta">
              <span id="progressLabel">等待任务</span>
              <span id="resultStats" class="result-stats">未读取</span>
            </div>
            <div class="progress-track">
              <div id="progressBar" class="progress-bar"></div>
            </div>
          </div>
        </div>

        <div class="results-header">
          <div>
            <h2>🌸 资源画廊</h2>
            <p>点击海报查看详情与磁力链接</p>
          </div>
          <div class="header-actions">
            <button id="exportMagnets" type="button">💾 导出磁力</button>
            <button id="openConfigFromHeader" type="button">⚙ 参数</button>
            <button id="openLogFromHeader" type="button">📋 日志</button>
          </div>
        </div>

        <div class="results-toolbar">
          <div class="result-path">
            <span>结果目录</span>
            <input id="resultDir" type="text" placeholder="默认读取输出目录">
          </div>
          <button id="chooseResultDir" type="button">选择</button>
          <button id="loadResults" type="button">读取</button>
        </div>
        <div class="results-tools">
          <input id="resultSearch" type="search" placeholder="🔍 搜索番号 / 演员 / 标题 / 分类...">
        </div>
        <div id="actressFilter" class="actress-filter"></div>
        <div id="resultsMessage" class="results-message"></div>
        <div id="resultsList" class="results-list"></div>
      </section>

      <section id="configDrawer" class="drawer config-drawer open" aria-label="参数配置">
        <section class="panel controls-panel" id="controlsPanel">
          <div class="panel-header">
            <div>
              <h2>参数配置</h2>
              <p>设置爬取参数后点击开始</p>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span id="statusBadge" class="status-badge">空闲</span>
              <button id="closeConfigDrawer" class="icon-button" type="button" title="关闭配置">×</button>
            </div>
          </div>
          <form id="crawlForm" class="panel-body" autocomplete="off">
            <div class="form-section-title">基础参数</div>
            <div class="form-row">
              <div class="form-group">
                <label for="limit">抓取数量 (0=不限)</label>
                <input id="limit" type="number" min="0" value="0" placeholder="0">
              </div>
              <div class="form-group">
                <label for="parallel">并发数</label>
                <input id="parallel" type="number" min="1" value="2" placeholder="2">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="timeout">超时 (秒)</label>
                <input id="timeout" type="number" min="1" value="30" placeholder="30">
              </div>
              <div class="form-group">
                <label for="delay">延迟 (秒)</label>
                <input id="delay" type="number" min="0" step="0.5" value="2" placeholder="2">
              </div>
            </div>
            <div class="form-group">
              <label for="search">搜索关键词</label>
              <input id="search" type="text" placeholder="留空则爬取列表页">
            </div>
            <div class="form-group">
              <label for="base">基础 URL</label>
              <input id="base" type="url" placeholder="默认使用内置地址">
            </div>

            <div class="form-section-title">网络设置</div>
            <div class="form-group">
              <label for="proxy">代理地址</label>
              <input id="proxy" type="text" placeholder="http://host:port 或 socks5://host:port">
            </div>
            <div class="form-group">
              <label for="cookies">Cookies</label>
              <input id="cookies" type="text" placeholder="可选，用于绕过验证">
            </div>

            <div class="form-section-title">输出设置</div>
            <div class="form-group">
              <label for="output">输出目录</label>
              <div style="display:flex;gap:6px">
                <input id="output" type="text" placeholder="默认当前目录">
                <button id="chooseOutput" type="button" style="flex-shrink:0">选择</button>
                <button id="openOutput" type="button" style="flex-shrink:0">打开</button>
              </div>
            </div>

            <div class="form-section-title">高级选项</div>
            <div class="form-row">
              <div class="form-check"><input id="cloudflare" type="checkbox"><label for="cloudflare">Cloudflare 绕过</label></div>
              <div class="form-check"><input id="nomag" type="checkbox"><label for="nomag">跳过无磁力</label></div>
              <div class="form-check"><input id="allmag" type="checkbox"><label for="allmag">获取全部磁力</label></div>
              <div class="form-check"><input id="nopic" type="checkbox"><label for="nopic">跳过图片下载</label></div>
              <div class="form-check"><input id="debug" type="checkbox"><label for="debug">调试日志</label></div>
              <div class="form-check"><input id="noStrictSsl" type="checkbox"><label for="noStrictSsl">忽略 SSL 错误</label></div>
            </div>
          </form>
          <div class="panel-footer">
            <textarea id="commandPreview" class="command-preview" readonly rows="2">jav crawl</textarea>
            <div class="action-row">
              <button id="startCrawl" class="primary" type="button">🚀 开始抓取</button>
              <button id="stopTask" type="button" disabled>⏹ 停止</button>
              <button id="startUpdate" type="button">🔄 更新 URL</button>
            </div>
          </div>
        </section>
      </section>

      <section id="logDrawer" class="drawer log-drawer" aria-label="运行日志">
        <div class="panel-header">
          <h2>📋 运行日志</h2>
          <div class="log-tools">
            <button class="log-filter active" type="button" data-filter="all">全部</button>
            <button class="log-filter" type="button" data-filter="error">错误</button>
            <button class="log-filter" type="button" data-filter="success">成功</button>
            <button id="clearLog" type="button">清空</button>
            <button id="closeLogDrawer" class="icon-button" type="button" title="关闭日志">×</button>
          </div>
        </div>
        <pre id="logOutput" class="log-output"></pre>
      </section>

      <section id="detailModal" class="modal" aria-hidden="true">
        <div id="modalBackdrop" class="modal-backdrop"></div>
        <article class="detail-dialog">
          <button id="closeDetailModal" class="modal-close" type="button" title="关闭">×</button>
          <div id="detailPoster" class="detail-poster"></div>
          <div class="detail-content">
            <div id="detailTags" class="tag-row"></div>
            <h2 id="detailTitle"></h2>
            <div id="detailMeta" class="detail-meta"></div>
            <div class="detail-actions">
              <button id="copyDetailFirst" class="primary" type="button">复制首个磁力</button>
              <button id="copyDetailAll" type="button">复制全部</button>
              <button id="openDetailFirst" type="button">调用下载器</button>
            </div>
            <div id="detailMagnetList" class="detail-magnet-list"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
